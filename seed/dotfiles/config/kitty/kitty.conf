############################
# Core
############################

editor                     nvim
allow_remote_control       yes
shell_integration          no-title no-cursor
macos_option_as_alt        yes
notify_on_cmd_finish       unfocused 5.0 notify

confirm_os_window_close            -1 count-background
macos_quit_when_last_window_closed yes
macos_show_window_title_in         none


############################
# Bell
############################

enable_audio_bell          no
visual_bell_duration       0.15
visual_bell_color          #fb4934
window_alert_on_bell       yes
bell_on_tab                "*"


############################
# URLs / clipboard
############################

url_style                  curly
url_color                  #83a598
copy_on_select             clipboard
strip_trailing_spaces      smart
select_by_word_characters  @-./_~?&=%+#:


############################
# Window / Decorations
############################

macos_titlebar_color       background
inactive_text_alpha        0.85

remember_window_size       no
initial_window_width       1200
initial_window_height      750

window_padding_width       5
window_margin_width        1
single_window_margin_width 0

window_border_width        3pt
active_border_color        #cc241d

enabled_layouts            tall, stack, *


############################
# Background image
############################

background_image           __HOME__/Pictures/pics/wallpappers/thumb-1920-696469.png
background_image_layout    scaled
background_opacity         0.85
background_tint            0.95
dynamic_background_opacity yes


############################
# Fonts
############################

font_size                  12.0


############################
# Cursor
############################

cursor_blink_interval      0
cursor_trail               200
cursor_trail_decay         0.1 0.4
cursor_trail_start_threshold 2


############################
# Scroll / Mouse
############################

scrollback_lines           15000
wheel_scroll_multiplier    3.0
mouse_hide_wait            -1


############################
# Selection
############################

selection_foreground       #1d2021
selection_background       #d4be98


############################
# Tabs (Gruvbox Material)
#   The bar is rendered by tab_bar.py because tab_bar_style = custom.
############################

tab_bar_edge               top
tab_bar_style              custom
tab_bar_align              center
tab_bar_min_tabs           1
tab_bar_margin_height      5 5
tab_bar_margin_width       1

tab_bar_background         #1d2021
inactive_tab_background    #32302f
inactive_tab_foreground    #d4be98
active_tab_background      #d79921
active_tab_foreground      #1d2021


############################
# Startup
############################

startup_session            kitty-startup.session


############################
# Keybindings
############################

# --- Font size ---
map ctrl+shift+backspace   change_font_size all 0
map cmd+equal              change_font_size all +2.0
map cmd+minus              change_font_size all -2.0
map cmd+0                  change_font_size all 0

# --- Windows (splits) ---
map --allow-fallback=shifted,ascii ctrl+shift+enter  new_window
map --allow-fallback=shifted,ascii ctrl+shift+]      next_window
map --allow-fallback=shifted,ascii ctrl+shift+[      previous_window
map --allow-fallback=shifted,ascii cmd+w             close_window_with_confirmation
map --allow-fallback=shifted,ascii cmd+shift+n       new_os_window
map --allow-fallback=shifted,ascii cmd+d             launch --location=hsplit --cwd=current
map --allow-fallback=shifted,ascii cmd+shift+d       launch --location=vsplit --cwd=current
map --allow-fallback=shifted,ascii cmd+]             next_window
map --allow-fallback=shifted,ascii cmd+[             previous_window
map f1                     new_window_with_cwd

# --- Tabs ---
map --allow-fallback=shifted,ascii ctrl+shift+t      new_tab
map ctrl+shift+right       next_tab
map ctrl+shift+left        previous_tab
map --allow-fallback=shifted,ascii ctrl+shift+q      close_tab
map --allow-fallback=shifted,ascii cmd+t             launch --cwd=current --type=tab
map --allow-fallback=shifted,ascii cmd+shift+,       set_tab_title
map cmd+1                  goto_tab 1
map cmd+2                  goto_tab 2
map cmd+3                  goto_tab 3
map cmd+4                  goto_tab 4
map cmd+5                  goto_tab 5
map cmd+6                  goto_tab 6
map cmd+7                  goto_tab 7
map cmd+8                  goto_tab 8
map cmd+9                  goto_tab 9

# --- Layouts ---
map --allow-fallback=shifted,ascii ctrl+shift+l      next_layout
map --allow-fallback=shifted,ascii ctrl+alt+r        goto_layout tall
map --allow-fallback=shifted,ascii ctrl+alt+s        goto_layout stack

# --- Clear screen + scrollback ---
map --allow-fallback=shifted,ascii cmd+k             combine : clear_terminal scrollback active : send_text normal,application \x0c

# --- Word/line motion ---
map alt+left               send_text all \x1b\x62
map alt+right              send_text all \x1b\x66
map cmd+left               send_text all \x01
map cmd+right              send_text all \x05

# --- Clipboard ---
map --allow-fallback=shifted,ascii cmd+c             copy_to_clipboard
map --allow-fallback=shifted,ascii cmd+v             paste_from_clipboard

# --- Background opacity (requires dynamic_background_opacity yes) ---
map cmd+shift+a>m          set_background_opacity +0.05
map cmd+shift+a>l          set_background_opacity -0.05
map cmd+shift+a>1          set_background_opacity 1.0
map cmd+shift+a>d          set_background_opacity default

# --- Hint kittens (URLs, paths, lines, words, hashes) ---
map --allow-fallback=shifted,ascii cmd+shift+e       open_url_with_hints
map cmd+shift+p>f          kitten hints --type path --program -
map cmd+shift+p>shift+f    kitten hints --type path
map cmd+shift+p>l          kitten hints --type line --program -
map cmd+shift+p>w          kitten hints --type word --program -
map cmd+shift+p>h          kitten hints --type hash --program -
map cmd+shift+p>n          kitten hints --type linenum

# --- Misc kittens ---
map --allow-fallback=shifted,ascii cmd+shift+g       show_last_command_output
map cmd+f launch --type=overlay --stdin-source=@screen_scrollback /opt/homebrew/bin/fzf --no-sort --no-mouse --exact -i
map kitty_mod+/      launch --allow-remote-control kitty +kitten kitty_search/search.py @active-kitty-window-id

# BEGIN_KITTY_THEME
# Gruvbox Material Dark Soft
include current-theme.conf
# END_KITTY_THEME


# BEGIN_KITTY_FONTS
font_family      family="IBM Plex Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# --- 1Password ---
map --allow-fallback=shifted,ascii ctrl+alt+p        kitten onepassword_kitten.py
map --allow-fallback=shifted,ascii cmd+shift+p       kitten onepassword_kitten.py "macbook"
map --allow-fallback=shifted,ascii ctrl+alt+o        kitten onepassword_kitten.py "GitHub" otp
map --allow-fallback=shifted,ascii ctrl+alt+u        kitten onepassword_kitten.py "GitHub" username
map --allow-fallback=shifted,ascii ctrl+alt+s        kitten onepassword_kitten.py "op://Personal/MyServer/password"
map --allow-fallback=shifted,ascii ctrl+alt+v        kitten onepassword_kitten.py --paste "GitHub"
